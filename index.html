<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevForge — Open Source Developer Toolkit</title>
    <meta
      name="description"
      content="A beautiful, modular collection of 10+ developer tools. JSON formatter, Base64 encoder, hash generator, password generator and more. Free, open source, works offline."
    />
    <meta
      name="keywords"
      content="developer tools, json formatter, base64 encoder, hash generator, uuid generator, open source, devtools"
    />
    <meta name="author" content="DevForge Contributors" />
    <meta property="og:title" content="DevForge — Open Source Developer Toolkit" />
    <meta
      property="og:description"
      content="A beautiful, modular collection of developer utilities. Free & open source."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="devforge-version" content="0.1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css?v=2" />
    <link rel="stylesheet" href="css/extra.css?v=2" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Canvas Confetti for Reward Animations -->
    <script
      src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"
      defer
    ></script>

    <!-- Force new service worker if old cache exists -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(function (reg) {
          if (reg) {
            reg.update();
            reg.addEventListener('updatefound', function () {
              var newWorker = reg.installing;
              newWorker.addEventListener('statechange', function () {
                if (newWorker.state === 'activated') {
                  // Force reload to get fresh content
                  if (!window._devforgeReloaded) {
                    window._devforgeReloaded = true;
                    window.location.reload();
                  }
                }
              });
            });
          }
        });

        // Safety check: if 0 tools after 3 seconds, force reload
        setTimeout(function () {
          if (window.DevForge && window.DevForge.tools && window.DevForge.tools.length === 0) {
            console.warn('[DevForge] 0 tools loaded — clearing cache and reloading...');
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistration().then(function (reg) {
                if (reg) reg.unregister();
              });
            }
            if (caches) {
              caches.keys().then(function (keys) {
                keys.forEach(function (key) {
                  caches.delete(key);
                });
              });
            }
            window.location.reload();
          }
        }, 3000);
      }
    </script>
  </head>
  <body>
    <!-- ============ HEADER ============ -->
    <header class="header">
      <a href="#/" class="header-logo" id="header-logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="7" fill="url(#logo-grad)" />
          <path
            d="M8 20L13 8h2l5 12h-2.2l-1.2-3H11.4l-1.2 3H8zm4.2-5h3.6L14 10.5 12.2 15z"
            fill="#fff"
          />
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
              <stop stop-color="#8b5cf6" />
              <stop offset="1" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">DevForge</span>
      </a>

      <div class="header-search">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" placeholder="Search tools..." id="search-input" autocomplete="off" />
        <kbd>Ctrl+K</kbd>
      </div>

      <div class="header-actions">
        <!-- Sound toggle -->
        <button class="header-btn sound-toggle-btn" id="sound-toggle" title="Toggle audio feedback">
          <!-- Speaker Icon (On) -->
          <svg
            class="icon-sound-on"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
          </svg>
          <!-- Speaker Icon (Off) -->
          <svg
            class="icon-sound-off"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="display: none"
          >
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <line x1="23" y1="9" x2="17" y2="15" />
            <line x1="17" y1="9" x2="23" y2="15" />
          </svg>
        </button>
        <!-- Language Selector -->
        <div class="dropdown" style="position: relative">
          <button
            class="header-btn"
            id="lang-selector-btn"
            style="
              display: flex;
              align-items: center;
              gap: 4px;
              padding: 4px 10px;
              font-size: 0.85rem;
              font-weight: 600;
            "
          >
            <span id="current-lang-flag">🌐</span>
            <span id="current-lang-code">EN</span>
            <svg
              width="12"
              height="12"
              viewBox="0 0 12 12"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 5l3 3 3-3" />
            </svg>
          </button>
          <div
            class="dropdown-menu"
            id="lang-dropdown"
            style="
              display: none;
              position: absolute;
              top: 100%;
              right: 0;
              background: var(--bg-secondary);
              border: 1px solid var(--border-primary);
              border-radius: 8px;
              box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
              min-width: 200px;
              max-height: 400px;
              overflow-y: auto;
              z-index: 1000;
              margin-top: 4px;
              padding: 8px 0;
            "
          >
            <!-- Populated by JS -->
          </div>
        </div>
        <!-- PWA Install Button -->
        <button class="header-btn" id="pwa-install-btn" title="Install App" style="display: none">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
          </svg>
        </button>
        <button class="header-btn" id="theme-toggle" title="Toggle theme">
          <!-- Sun icon (shown in dark mode) -->
          <svg
            class="icon-sun"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg
            class="icon-moon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="display: none"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
        <a href="https://github.com" target="_blank" rel="noopener" class="github-link">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          <span>GitHub</span>
        </a>
      </div>
    </header>

    <!-- ============ APP LAYOUT ============ -->
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <p class="sidebar-title">Categories</p>
        <nav class="categories" id="categories">
          <!-- Populated by app.js -->
        </nav>
        <div class="sidebar-footer">
          <p id="tool-count">0 tools available</p>
          <a href="https://github.com" target="_blank" rel="noopener">＋ Add your tool</a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <!-- Rendered dynamically by app.js -->
      </main>
    </div>

    <!-- Command Palette Modal -->
    <div
      class="cmd-palette-backdrop"
      id="cmd-backdrop"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        z-index: 150;
        align-items: flex-start;
        justify-content: center;
        padding-top: 15vh;
        animation: fadeIn 0.2s ease;
      "
    >
      <div
        class="cmd-palette-box"
        style="
          background: var(--bg-secondary);
          border: 1px solid var(--border-accent);
          border-radius: var(--radius-lg);
          width: 100%;
          max-width: 600px;
          box-shadow: var(--shadow-lg);
          overflow: hidden;
          animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        "
      >
        <div
          style="
            display: flex;
            align-items: center;
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-primary);
            gap: var(--space-sm);
          "
        >
          <span style="font-size: 1.2rem; color: var(--text-accent)">❯</span>
          <input
            type="text"
            id="cmd-input"
            placeholder="Type a command (e.g. >uuid, >theme light) or search..."
            style="
              flex: 1;
              background: none;
              border: none;
              outline: none;
              font-size: 1rem;
              color: var(--text-primary);
            "
            autocomplete="off"
          />
          <span
            style="
              font-size: 0.7rem;
              color: var(--text-tertiary);
              background: var(--bg-input);
              padding: 2px 8px;
              border-radius: 4px;
              border: 1px solid var(--border-primary);
            "
            >ESC to close</span
          >
        </div>
        <div id="cmd-results" style="max-height: 300px; overflow-y: auto; padding: var(--space-sm)">
          <!-- Populated via app.js -->
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Core -->
    <script src="js/i18n.js?v=2" defer></script>
    <script src="js/lang-selector.js?v=2" defer></script>
    <script src="js/sound.js?v=2" defer></script>
    <script src="js/contributors.js?v=2" defer></script>
    <script src="js/app.js?v=2" defer></script>

    <!-- Tools — each tool self-registers via DevForge.registerTool() -->
    <script src="tools/smart-transformer.js?v=2" defer></script>
    <script src="tools/knowledge-base.js?v=2" defer></script>
    <script src="tools/ai-assistant.js?v=2" defer></script>
    <script src="tools/json-formatter.js?v=2" defer></script>
    <script src="tools/base64-codec.js?v=2" defer></script>
    <script src="tools/hash-generator.js?v=2" defer></script>
    <script src="tools/url-codec.js?v=2" defer></script>
    <script src="tools/uuid-generator.js?v=2" defer></script>
    <script src="tools/color-converter.js?v=2" defer></script>
    <script src="tools/password-generator.js?v=2" defer></script>
    <script src="tools/timestamp-converter.js?v=2" defer></script>
    <script src="tools/markdown-preview.js?v=2" defer></script>
    <script src="tools/lorem-generator.js?v=2" defer></script>
    <script src="tools/jwt-decoder.js?v=2" defer></script>
    <script src="tools/diff-checker.js?v=2" defer></script>
    <script src="tools/cron-parser.js?v=2" defer></script>
    <script src="tools/image-optimizer.js?v=2" defer></script>
    <script src="tools/ai-packager.js?v=2" defer></script>
    <script src="tools/ai-sanitizer.js?v=2" defer></script>
    <script src="tools/web-terminal.js?v=2" defer></script>
    <script src="tools/opencode-config-generator.js?v=2" defer></script>
    <script src="tools/ai-agent-config-hub.js?v=2" defer></script>
    <script src="tools/breach-checker.js?v=2" defer></script>
    <script src="tools/llm-quality-monitor.js?v=2" defer></script>
  </body>
</html>
