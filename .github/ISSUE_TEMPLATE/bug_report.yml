name: 🐛 Bug Report
description: Report a bug or unexpected behavior in DevForge
title: '[Bug]: '
labels: ['bug', 'triage']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug! 🐛

        Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "When I click the 'Format' button in the JSON Formatter with valid JSON, nothing happens."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to the JSON Formatter tool
        2. Paste valid JSON into the input
        3. Click the 'Format' button
        4. See that nothing happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: 'The JSON should be formatted and displayed in the output area.'
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: 'The output area remains empty. No error shown in the UI.'
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Affected Tool
      description: Which tool has the bug? (e.g., "JSON Formatter", "Base64 Encoder")
      placeholder: 'JSON Formatter'
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: 'e.g., Windows 11, macOS 14 Sonoma, Ubuntu 22.04'
      placeholder: 'Windows 11'
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Any errors in the browser developer console? (F12 → Console tab)
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem. Drag and drop images here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
